<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá Ẩm thực Ninh Hòa - An toàn, Chất lượng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a3a;
            --secondary: #e67e22;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --neutral: #7f8c8d;
            --card-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            --border-radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #fff8f0 0%, #f5ede4 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            padding: 30px 30px 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header .logo { font-size: 42px; color: var(--secondary); margin-bottom: 6px; }
        .header h1 { color: var(--primary); font-weight: 700; font-size: 30px; letter-spacing: 1px; }
        .header h1 span { color: var(--secondary); }
        .header p { color: #7f8c8d; font-size: 16px; margin-top: 6px; }

        /* Loading Spinner */
        .loading-container { text-align: center; padding: 50px; font-size: 18px; color: var(--primary); }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%;
            border-left-color: var(--secondary); animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Search & Filter */
        .search-section { background: white; border-radius: var(--border-radius); padding: 20px 25px; box-shadow: var(--card-shadow); margin-bottom: 30px; }
        .search-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; }
        .search-group label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 5px; }
        .search-group label i { color: var(--secondary); margin-right: 6px; }
        .search-group input, .search-group select { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e6ed; border-radius: 10px; font-size: 14px; outline: none; background: #fafcfe; }
        .search-group input:focus, .search-group select:focus { border-color: var(--secondary); }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 16px; border-radius: var(--border-radius); box-shadow: var(--card-shadow); text-align: center; }
        .stat-card i { font-size: 28px; opacity: 0.7; }
        .stat-card h4 { font-weight: 400; font-size: 13px; color: #7f8c8d; margin: 6px 0 2px; }
        .stat-card p { font-size: 24px; font-weight: 700; color: var(--primary); }

        /* Grid */
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .food-card { background: white; border-radius: var(--border-radius); overflow: hidden; box-shadow: var(--card-shadow); transition: 0.3s; display: flex; flex-direction: column; }
        .food-card:hover { transform: translateY(-6px); }
        
        .food-card .card-image { height: 200px; background: #fcfcfc; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .food-card .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .food-card .card-image .no-img-placeholder { color: #bdc3c7; font-size: 14px; text-align: center; padding: 20px; font-style: italic; }
        
        .food-card .card-image .badge-status {
            position: absolute; top: 12px; right: 12px; padding: 5px 14px;
            border-radius: 30px; font-size: 12px; font-weight: 600; color: white;
            display: flex; align-items: center; gap: 5px; z-index: 10;
        }
        .badge-status.red { background: var(--danger); }
        .badge-status.yellow { background: var(--warning); }
        .badge-status.green { background: var(--success); }
        .badge-status.gray { background: var(--neutral); }

        .food-card .card-body { padding: 18px 20px 20px; flex-grow: 1; }
        .food-card .card-body .name { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .food-card .card-body .category { font-size: 13px; color: #7f8c8d; margin-bottom: 8px; display: flex; gap: 6px; }
        .food-card .card-body .address { font-size: 14px; color: #555; margin-bottom: 8px; display: flex; gap: 6px; }
        
        .food-card .card-footer { padding: 12px 20px 18px; border-top: 1px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; }
        .btn-detail { background: var(--secondary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-map { background: #3498db; color: white; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; }
        .btn-map.disabled { background: #bdc3c7; cursor: not-allowed; pointer-events: none; opacity: 0.6; }
        
        /* Interactive Rating Component */
        .rating-container { display: flex; flex-direction: column; gap: 2px; }
        .stars-interactive { color: #ccc; font-size: 16px; cursor: default;} //pointer-events: none Khóa sao
        .stars-interactive .fa-star.active { color: #f39c12; }
        .saving-text { font-size: 10px; color: #7f8c8d; font-style: italic; min-height: 12px; }

        .no-result { text-align: center; padding: 60px 20px; color: #95a5a6; display: none; }

        /* Pagination Styling */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 40px; flex-wrap: wrap; }
        .pagination-btn { background: white; border: 1.5px solid #e0e6ed; padding: 8px 16px; border-radius: 8px; font-weight: 600; color: var(--primary); cursor: pointer; transition: 0.2s; font-size: 14px; }
        .pagination-btn:hover:not(.disabled) { border-color: var(--secondary); color: var(--secondary); }
        .pagination-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .pagination-btn.disabled { background: #f5f5f5; color: #bdc3c7; cursor: not-allowed; border-color: #e0e6ed; }

        @media (max-width: 992px) { .search-row { grid-template-columns: 1fr 1fr; } .stats { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .search-row { grid-template-columns: 1fr; } .food-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🍜</div>
        <h1>Khám phá <span>Ẩm thực</span> Ninh Hòa</h1>
        <p>📍 Địa chỉ ăn uống an toàn, chất lượng tại Phường Ninh Hòa, Khánh Hòa</p>
    </div>

    <div class="stats">
        <div class="stat-card"><i class="fas fa-utensils" style="color:var(--primary)"></i><h4>Địa điểm ăn uống</h4><p id="total-places">0</p></div>
        <div class="stat-card"><i class="fas fa-check-circle" style="color:#27ae60;"></i><h4>Cơ sở Đạt chuẩn</h4><p id="total-safe">0</p></div>
        <div class="stat-card"><i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i><h4>Cần lưu ý</h4><p id="total-warning">0</p></div>
        <div class="stat-card"><i class="fas fa-star" style="color:#f39c12;"></i><h4>Được yêu thích</h4><p id="total-fav">0</p></div>
    </div>

    <div class="search-section">
        <div class="search-row">
            <div class="search-group">
                <label><i class="fas fa-search"></i> Tìm quán ăn</label>
                <input type="text" id="search-name" placeholder="Nhập tên quán, món ăn...">
            </div>
            <div class="search-group">
                <label><i class="fas fa-layer-group"></i> Loại hình</label>
                <select id="filter-group-type">
                    <option value="">Tất cả</option>
                </select>
            </div>
            <div class="search-group">
                <label><i class="fas fa-traffic-light"></i> Kết quả Đánh giá</label>
                <select id="filter-status">
                    <option value="">Tất cả</option>
                    <option value="green">🟢 Đạt</option>
                    <option value="yellow">🟡 Sắp hết hạn</option>
                    <option value="red">🔴 Cảnh báo</option>
                </select>
            </div>
            <div class="search-group">
                <label><i class="fas fa-star"></i> Xếp hạng</label>
                <select id="filter-rating">
                    <option value="">Tất cả</option>
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐ và trên</option>
                    <option value="3">⭐⭐⭐ và trên</option>
                </select>
            </div>
        </div>
    </div>

    <div id="loading" class="loading-container">
        <div class="spinner"></div>
        <p>Đang tải dữ liệu thực tế từ Google Sheet...</p>
    </div>

    <div class="food-grid" id="food-grid"></div>
    <div id="no-result-msg" class="no-result">
        <i class="fas fa-search" style="font-size: 48px; display: block; margin-bottom: 12px; color: #bdc3c7;"></i>
        <p>Không tìm thấy địa điểm ăn uống phù hợp</p>
    </div>

    <div id="pagination" class="pagination-container"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh49a8OooubenyqmE1y9EgDtUaXNuYrcyLROSRtxh6BV-2RP7K0a-U_hD4xdLRUvp2/exec";
    
    let rawData = [];
    let filteredData = [];
    let currentPage = 1;
    const ITEMS_PER_PAGE = 60;

    async function fetchData() {
        try {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('food-grid').innerHTML = '';
            
            const response = await fetch(SCRIPT_URL);
            rawData = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            populateGroupFilter(rawData);
            
            filteredData = [...rawData];
            updateStats(rawData);
            renderCards();
        } catch (error) {
            console.error("Lỗi lấy dữ liệu: ", error);
            document.getElementById('loading').innerHTML = '<p style="color:red;font-weight:bold;">Không thể kết nối đến cơ sở dữ liệu Google Sheet. Vui lòng kiểm tra lại Web App Script!</p>';
        }
    }

    function populateGroupFilter(data) {
        const selectElem = document.getElementById('filter-group-type');
        const groups = new Set();
        
        data.forEach(item => {
            const nhom = (item.nhom || item.nhomCoSo || '').toString().trim();
            if (nhom && nhom !== "False" && nhom !== "--") {
                groups.add(nhom);
            }
        });
        
        selectElem.innerHTML = '<option value="">Tất cả</option>';
        Array.from(groups).sort().forEach(group => {
            const option = document.createElement('option');
            option.value = group;
            option.textContent = group;
            selectElem.appendChild(option);
        });
    }

    function isBlankOrDefault(value) {
        if (value === undefined || value === null) return true;
        const str = value.toString().trim();
        if (str === "" || str.toLowerCase() === "false" || str === "--" || str === "Chưa có" || str === "Chưa cập nhật") return true;
        return false;
    }

    function parseDateStr(dateStr) {
        if (isBlankOrDefault(dateStr)) return null;
        const s = dateStr.toString().trim();
        
        let parts = s.split('/');
        if (parts.length === 3) {
            return new Date(parseInt(parts[2], 10), parseInt(parts[1], 10) - 1, parseInt(parts[0], 10));
        }
        parts = s.split('-');
        if (parts.length === 3) {
            return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        }
        const d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
    }

    function formatDateVN(dateStr) {
        const dateObj = parseDateStr(dateStr);
        if (!dateObj) return '--';
        
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        
        return `${day}/${month}/${year}`;
    }

    function getStatusColor(item) {
        const gcn = item.gcn || item.gcnAttp || '';
        const statGcn = isBlankOrDefault(gcn) ? 'red' : 'green';

        const ngayCap = item.ngayCap || item.ngaycap || '';
        const statNgayCap = isBlankOrDefault(ngayCap) ? 'red' : 'green';

        const ngayKiemTra = item.ngayKiemTra || item.ngaykiemtra || '';
        const statNgayKiemTra = isBlankOrDefault(ngayKiemTra) ? 'red' : 'green';

        const kqKiemTra = (item.ketQua || item.ketqua || item["Kết quả"] || '').toString().trim();
        let statKqKiemTra = 'red';
        if (kqKiemTra === 'Đạt') {
            statKqKiemTra = 'green';
        }

        const ngayHetHanStr = item.ngayHetHan || item.ngayhethan || '';
        const dateHetHan = parseDateStr(ngayHetHanStr);
        let statNgayHetHan = 'red';

        if (dateHetHan) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            dateHetHan.setHours(0, 0, 0, 0);
            
            const diffTime = dateHetHan.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                statNgayHetHan = 'red';
            } else if (diffDays < 31) {
                statNgayHetHan = 'yellow';
            } else {
                statNgayHetHan = 'green';
            }
        }

        if (statGcn === 'red' || statNgayCap === 'red' || statNgayKiemTra === 'red' || statKqKiemTra === 'red' || statNgayHetHan === 'red') {
            return 'red';
        }
        if (statNgayHetHan === 'yellow') {
            return 'yellow';
        }
        return 'green';
    }

    function getStatusText(status, item) {
        if (status === 'red') return 'Cảnh báo';
        if (status === 'yellow') return 'Sắp hết hạn';
        if (status === 'green') return 'Đạt';
        return 'Chưa kiểm tra';
    }

    function generateMapLink(item) {
        const rawCoords = (item.toaDo || item.toado || item["Tọa độ"] || '').toString().trim();
        const name = (item.ten || item.tenCoSo || '').toString().trim();

        if (isBlankOrDefault(rawCoords)) {
            if (!name) return null;
            const destination = encodeURIComponent(name + ", Ninh Hòa, Khánh Hòa");
            return `https://www.google.com/maps/dir/?api=1&destination=$${destination}`;
        }

        const coordRegex = /^-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?$/;

        if (coordRegex.test(rawCoords)) {
            const cleanCoords = rawCoords.replace(/\s+/g, '');
            return `https://www.google.com/maps/dir/?api=1&destination=$${cleanCoords}`;
        } else {
            const locationName = encodeURIComponent(rawCoords + ", Ninh Hòa, Khánh Hòa");
            return `https://www.google.com/maps/dir/?api=1&destination=$${locationName}`;
        }
    }

    async function updateRatingInSheet(stt, ratingValue, parentElement) {
        const statusTextElem = document.getElementById(`save-status-${stt}`);
        statusTextElem.textContent = "⏳ Đang lưu...";
        
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ "stt": stt, "rating": ratingValue })
            });
            
            const localItem = rawData.find(d => parseInt(d.stt) === parseInt(stt));
            if (localItem) localItem.rating = ratingValue;
            
            statusTextElem.textContent = "✅ Đã lưu!";
            setTimeout(() => { statusTextElem.textContent = ""; }, 2000);
            
            // Cập nhật lại số liệu thống kê sau khi người dùng đổi rating (yêu thích)
            updateStats(filteredData);
        } catch (error) {
            statusTextElem.textContent = "❌ Lỗi kết nối";
            console.error(error);
        }
    }

    function openDetailPage(stt) {
        const item = rawData.find(d => parseInt(d.stt) === parseInt(stt));
        if (!item) return;
        
        const detailWindow = window.open('', '_blank');
        if (!detailWindow) return alert('Vui lòng cho phép mở pop-up trên trình duyệt!');

        const status = getStatusColor(item);
        const statusText = getStatusText(status, item);
        
        const colorMap = { 
            red: { c: '#e74c3c', i: 'fa-exclamation-triangle' }, 
            yellow: { c: '#f39c12', i: 'fa-clock' }, 
            green: { c: '#27ae60', i: 'fa-check-circle' }
        };
        
        let imageSectionHtml = '';
        if (item.anhDaiDien && String(item.anhDaiDien).trim() !== "" && String(item.anhDaiDien).trim() !== "False") {
            if(String(item.anhDaiDien).includes('<img')) {
                imageSectionHtml = `<div style="width:100%; max-height:320px; display:flex; justify-content:center; background:#f0f0f0; overflow:hidden;">${item.anhDaiDien}</div>`;
            } else {
                imageSectionHtml = `<img src="${item.anhDaiDien}" style="width:100%; max-height:320px; object-fit:cover;">`;
            }
        }

        let descSectionHtml = '';
        if (item.moTa && String(item.moTa).trim() !== "" && String(item.moTa).trim() !== "False") {
            descSectionHtml = `
                <div class="desc-box">
                    <h4><i class="fas fa-info-circle"></i> Mô tả chi tiết</h4>
                    <p>${item.moTa}</p>
                </div>`;
        }

        const finalMapLink = generateMapLink(item);
        const mapBtnHtml = finalMapLink ? `<a href="${finalMapLink}" target="_blank" class="btn btn-dir"><i class="fas fa-directions"></i> Tìm trên Google Map</a>` : '';

        const formattedNgayCap = formatDateVN(item.ngayCap || item.ngaycap);
        const formattedNgayHetHan = formatDateVN(item.ngayHetHan || item.ngayhethan);

        detailWindow.document.write(`
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>${item.ten || item.tenCoSo} - Chi tiết</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f5f0eb; padding: 30px; display:flex; justify-content:center; }
        .box { max-width: 800px; width:100%; background: white; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow:hidden; }
        .head { background: #1a2a3a; color:white; padding:25px; position:relative;}
        .badge { position:absolute; top:25px; right:25px; padding:6px 12px; border-radius:20px; color:white; font-weight:bold; background:${colorMap[status].c} }
        .body { padding:25px; }
        .desc-box { background: #fef9f4; padding:15px; border-left:4px solid #e67e22; margin-bottom:20px; line-height:1.6; }
        .desc-box img { max-width:100%; height:auto; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px; }
        .item { background:#f8f6f4; padding:12px; border-radius:6px; }
        .lbl { font-size:12px; color:#7f8c8d; font-weight:bold; margin-bottom:4px; }
        .val { font-weight:500; color:#2c3e50; }
        .btn { display:inline-block; padding:10px 20px; border-radius:6px; text-decoration:none; font-weight:bold; color:white; background:#7f8c8d; border:none; cursor:pointer; margin-right:10px;}
        .btn-dir { background:#e67e22; }
    </style>
</head>
<body>
    <div class="box">
        <div class="head">
            <h2>${item.ten || item.tenCoSo || '--'}</h2>
            <p><i class="fas fa-map-marker-alt"></i> ${item.diaChi || 'Chưa cập nhật địa chỉ'}</p>
            <span class="badge"><i class="fas ${colorMap[status].i}"></i> ${statusText}</span>
        </div>
        ${imageSectionHtml}
        <div class="body">
            ${descSectionHtml}
            <div class="grid">
                <div class="item"><div class="lbl">Loại hình</div><div class="val">${item.nhom || '--'}</div></div>
                <div class="item"><div class="lbl">Sản phẩm chính</div><div class="val">${item.sanPham || '--'}</div></div>
                <div class="item"><div class="lbl">Chủ cơ sở</div><div class="val">${item.chu || item.chuCoSo || '--'}</div></div>
                <div class="item"><div class="lbl">Điện thoại</div><div class="val">${item.sdt || item.dienThoai || '--'}</div></div>
                <div class="item"><div class="lbl">Giấy chứng nhận ATTP</div><div class="val">${item.gcn || item.gcnAttp || '❌ Chưa cấp'}</div></div>
                <div class="item"><div class="lbl">Kết quả kiểm tra</div><div class="val">${item.ketQua || item.ketqua || 'Chưa có'}</div></div>
                <div class="item"><div class="lbl">Ngày cấp</div><div class="val">${formattedNgayCap}</div></div>
                <div class="item"><div class="lbl">Ngày hết hạn</div><div class="val">${formattedNgayHetHan}</div></div>
            </div>
            ${mapBtnHtml}
            <button onclick="window.close()" class="btn">Đóng</button>
        </div>
    </div>
</body>
</html>
        `);
        detailWindow.document.close();
    }

    function updateStats(data) {
        document.getElementById('total-places').textContent = data.length;
        document.getElementById('total-safe').textContent = data.filter(item => getStatusColor(item) === 'green').length;
        document.getElementById('total-warning').textContent = data.filter(item => getStatusColor(item) !== 'green').length;
        document.getElementById('total-fav').textContent = data.filter(item => (parseInt(item.rating || item.xepHang) || 0) >= 4).length;
    }

    function renderPagination() {
        const pagContainer = document.getElementById('pagination');
        pagContainer.innerHTML = '';
        
        const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.className = `pagination-btn ${currentPage === 1 ? 'disabled' : ''}`;
        prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderCards();
                window.scrollTo({ top: document.querySelector('.search-section').offsetTop, behavior: 'smooth' });
            }
        });
        pagContainer.appendChild(prevBtn);

        for (let i = 1; i <= totalPages; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = `pagination-btn ${currentPage === i ? 'active' : ''}`;
            pageBtn.textContent = i;
            pageBtn.addEventListener('click', () => {
                currentPage = i;
                renderCards();
                window.scrollTo({ top: document.querySelector('.search-section').offsetTop, behavior: 'smooth' });
            });
            pagContainer.appendChild(pageBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = `pagination-btn ${currentPage === totalPages ? 'disabled' : ''}`;
        nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                renderCards();
                window.scrollTo({ top: document.querySelector('.search-section').offsetTop, behavior: 'smooth' });
            }
        });
        pagContainer.appendChild(nextBtn);
    }

    function renderCards() {
        const grid = document.getElementById('food-grid');
        grid.innerHTML = '';
        const noResult = document.getElementById('no-result-msg');

        if (filteredData.length === 0) {
            noResult.style.display = 'block';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        noResult.style.display = 'none';

        const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
        const endIndex = startIndex + ITEMS_PER_PAGE;
        const pageItems = filteredData.slice(startIndex, endIndex);

        pageItems.forEach((item) => {
            const name = item.ten || item.tenCoSo || 'Chưa cập nhật tên';
            const ratingField = item.rating || item.xepHang || 0;
            
            const status = getStatusColor(item);
            const statusText = getStatusText(status, item);
            const currentRating = parseInt(ratingField) || 0;
            
            let mediaContent = '<div class="no-img-placeholder"><i class="far fa-image" style="font-size:24px;display:block;margin-bottom:4px;"></i>Cơ sở chưa cập nhật ảnh</div>';
            if (item.anhDaiDien && String(item.anhDaiDien).trim() !== "" && String(item.anhDaiDien).trim() !== "False") {
                if (String(item.anhDaiDien).includes('<img')) {
                    mediaContent = item.anhDaiDien;
                } else {
                    mediaContent = `<img src="${item.anhDaiDien}" alt="${name}">`;
                }
            }

            const finalMapLink = generateMapLink(item);
            const mapButtonHtml = finalMapLink 
                ? `<a href="${finalMapLink}" target="_blank" class="btn-map"><i class="fas fa-directions"></i> Đường đi</a>`
                : `<a href="#" class="btn-map disabled" onclick="return false;" title="Không tìm thấy thông tin vị trí"><i class="fas fa-directions"></i> Không có map</a>`;

            let iconClass = 'fa-question-circle';
            if (status === 'red') iconClass = 'fa-exclamation-triangle';
            else if (status === 'yellow') iconClass = 'fa-clock';
            else if (status === 'green') iconClass = 'fa-check-circle';

            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `
                <div class="card-image">
                    ${mediaContent}
                    <span class="badge-status ${status}"><i class="fas ${iconClass}"></i> ${statusText}</span>
                </div>
                <div class="card-body">
                    <div class="name">${name}</div>
                    <div class="category"><i class="fas fa-tag"></i> ${item.sanPham || 'Chưa cập nhật sản phẩm'}</div>
                    <div class="address"><i class="fas fa-map-marker-alt"></i> ${item.diaChi || 'Chưa cập nhật địa chỉ'}</div>
                </div>
                <div class="card-footer">
                    <div class="rating-container">
                        <div class="stars-interactive" data-stt="${item.stt}">
                            ${[1,2,3,4,5].map(star => `<i class="fas fa-star ${star <= currentRating ? 'active' : ''}" data-value="${star}"></i>`).join('')}
                        </div>
                        <span class="saving-text" id="save-status-${item.stt}"></span>
                    </div>
                    <div style="display:flex; gap:6px;">
                        ${mapButtonHtml}
                        <button class="btn-detail" onclick="openDetailPage(${item.stt})">Chi tiết</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
	// KHÓA *
        /* document.querySelectorAll('.stars-interactive i').forEach(star => {
            star.addEventListener('click', function() {
                const value = this.getAttribute('data-value');
                const parent = this.parentElement;
                const stt = parent.getAttribute('data-stt');
                
                const siblings = parent.querySelectorAll('i');
                siblings.forEach(s => {
                    if(s.getAttribute('data-value') <= value) s.classList.add('active');
                    else s.classList.remove('active');
                });
                
                updateRatingInSheet(stt, value, parent);
            });
        });*/

        renderPagination();
    }

    function filterData() {
        const searchName = document.getElementById('search-name').value.toLowerCase().trim();
        const groupType = document.getElementById('filter-group-type').value;
        const filterStatus = document.getElementById('filter-status').value;
        const filterRating = document.getElementById('filter-rating').value;

        filteredData = rawData.filter(item => {
            const name = item.ten || item.tenCoSo || '';
            const ratingField = item.rating || item.xepHang || 0;

            const matchName = String(name).toLowerCase().includes(searchName) || String(item.sanPham).toLowerCase().includes(searchName);
            const matchGroup = !groupType || (item.nhom || item.nhomCoSo || '') === groupType;
            const matchStatus = !filterStatus || (getStatusColor(item) === filterStatus);
            const matchRating = !filterRating || (parseInt(ratingField) || 0) >= parseInt(filterRating);

            return matchName && matchGroup && matchStatus && matchRating;
        });

        currentPage = 1;
        
        // CẬP NHẬT: Thêm dòng gọi hàm thống kê nhảy theo dữ liệu bộ lọc
        updateStats(filteredData);
        
        renderCards();
    }

    document.getElementById('search-name').addEventListener('input', filterData);
    document.getElementById('filter-group-type').addEventListener('change', filterData);
    document.getElementById('filter-status').addEventListener('change', filterData);
    document.getElementById('filter-rating').addEventListener('change', filterData);

    fetchData();
</script>
